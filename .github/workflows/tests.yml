name: Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "master" ]

# Builds images for target boards.
permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.25']
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go ${{ matrix.go }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}

      - name: Install protoc
        run: |
          PROTOC_VERSION=34.1
          archive="$RUNNER_TEMP/protoc.zip"
          url="https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          curl -sSLo "$archive" "$url"
          unzip -q "$archive" -d "$HOME/.local"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache tools
        uses: actions/cache@v5
        with:
          path: |
            ./hack/bin
          key: ${{ runner.os }}-aptre-tools-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-aptre-tools-

      - name: Test Go
        run: make test

      - name: Lint Go
        run: make lint

      - name: Check generated output
        run: make check-gengo
